name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # required to create GitHub Releases and upload assets

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Run the full quality gate before publishing
      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build production bundle
        run: npm run build

      # Create a GitHub Release and attach history-map-card.js as a release asset.
      # The release body is auto-generated from commits since the previous tag.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: history-map-card.js
